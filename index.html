<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fancy Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
html{scroll-behavior:smooth}
body{background:#020617;color:#fff;overflow-x:hidden}
nav{
  position:fixed;top:0;left:0;width:100%;z-index:1000;
  display:flex;justify-content:center;gap:18px;padding:16px;
  backdrop-filter:blur(12px);background:rgba(2,6,23,.65);
}
nav a{
  color:#e2e8f0;text-decoration:none;padding:10px 18px;border-radius:999px;
  transition:.3s;font-size:14px
}
nav a:hover{background:#38bdf8;color:#020617}
.slide{
  min-height:100vh;padding:100px 8% 60px;
  display:flex;align-items:center;justify-content:center;
}
.card{
  width:min(1100px,100%);
  background:rgba(15,23,42,.75);
  border:1px solid rgba(56,189,248,.2);
  backdrop-filter:blur(16px);
  border-radius:28px;
  padding:40px;
  box-shadow:0 20px 50px rgba(0,0,0,.35);
  animation:fadeUp .8s ease;
}
.hero{
  text-align:center;
  background:radial-gradient(circle at top right,#38bdf833,transparent 35%),
             radial-gradient(circle at bottom left,#8b5cf633,transparent 30%);
}
.hero h1{font-size:clamp(2.5rem,6vw,4.5rem);margin-bottom:10px}
.hero p{font-size:1.15rem;color:#cbd5e1;max-width:700px;margin:auto}
.badge{display:inline-block;background:#38bdf8;color:#020617;padding:8px 16px;border-radius:999px;font-weight:600;margin-bottom:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px}
